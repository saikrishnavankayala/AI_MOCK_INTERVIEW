# Netlify configuration file

[build]
  # Directory to change to before starting a build
  base = ""
  # Directory that contains the deploy-ready HTML files
  publish = "dist"
  # Default build command
  command = "npm run build"

# Redirects and rewrites
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # This ensures that all routes are directed to index.html for client-side routing

# Environment variables can be set here or in the Netlify UI
[build.environment]
  # Production API URL will need to be updated when you deploy your backend
  # VITE_API_BASE_URL = "https://your-backend-api-url.com"